---
- name: Configure Metricbeat on Windows
  ansible.windows.win_template:
    src: templates/metricbeat.yml.j2
    dest: "{{ _metricbeat_win_conf_path }}/metricbeat.yml"
  notify: Restart Metricbeat on Windows

- name: Setup Index and other Elasticsearch stuff on Windows
  ansible.windows.win_shell:
    cmd: metricbeat setup --index-management
  when: metricbeat_setup_index

- name: Setup Kibana Dashboards on Windows
  ansible.windows.win_shell:
    cmd: metricbeat setup --dashboards
  when: metricbeat_setup_dashboards
