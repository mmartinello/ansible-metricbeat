---
- name: Set package URL for 64-bit architecture
  ansible.builtin.set_fact:
    package_url: "{{ metricbeat_win_msi_64bit }}"
  when: not metricbeat_win_chocolatey and ansible_architecture == "64-bit"

# FIXME: check if OS really is 32 bit
- name: Set package URL for 32-bit architecture
  ansible.builtin.set_fact:
    package_url: "{{ metricbeat_win_msi_32bit }}"
  when: not metricbeat_win_chocolatey and ansible_architecture != "64-bit"

- name: Install Metricbeat using MSI
  ansible.windows.win_package:
    path: "{{ package_url }}"
    product_id: "{{ metricbeat_win_package_product_id }} "
    arguments: /qn /norestart
  when: not metricbeat_win_chocolatey
  notify: Restart Metricbeat on Windows

- name: Install Metricbeat using Chocolatey
  ansible.windows.win_chocolatey:
    name: metricbeat-oss
  when: metricbeat_win_chocolatey
  notify: Restart Metricbeat on Windows
